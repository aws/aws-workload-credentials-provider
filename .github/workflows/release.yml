name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number in the pattern x.y.z
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write

jobs:
  staging:
    uses: ./.github/workflows/staging.yml
    secrets: inherit
  publish:
    needs: [staging]
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ secrets.RELEASE_ROLE_ARN }}
          role-session-name: aws-wcp-release-${{ github.run_id }}
          aws-region: us-west-2

      - name: Upload artifacts to S3
        run: |
          aws s3 cp target/${{ matrix.target }}/release/aws-workload-credentials-provider${{ runner.os == 'Windows' && '.exe' || '' }} \
            "s3://${{ secrets.RELEASE_BUCKET }}/${{ inputs.version }}/${{ matrix.target }}/aws-workload-credentials-provider${{ runner.os == 'Windows' && '.exe' || '' }}"
